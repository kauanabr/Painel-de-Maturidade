<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --somma-dark:    #2E3E44;
    --somma-mid:     #4B646F;
    --somma-light:   #4D6571;
    --somma-slate:   #373C3C;
    --somma-gold:    #CC8B15;
    --somma-gold-lt: #E2A849;
    --somma-teal:    #007374;
    --somma-teal-lt: #24C6C1;
    --somma-gray:    #C3C4C6;
    --somma-bg:      #F7F8F8;
    --somma-white:   #FFFFFF;
    --somma-border:  #E2E6E8;
    --somma-text:    #2E3E44;
    --somma-muted:   #7A909A;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--somma-bg);
    color: var(--somma-text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    background: var(--somma-white);
    border-bottom: 1px solid var(--somma-border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
  }

  .logo-divider {
    width: 1px;
    height: 24px;
    background: var(--somma-border);
  }

  .logo-product {
    display: flex;
    flex-direction: column;
  }

  .logo-product-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--somma-dark);
    letter-spacing: 0.08em;
    line-height: 1.2;
  }

  .logo-product-sub {
    font-size: 10px;
    font-weight: 400;
    color: var(--somma-gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-badge {
    background: #EDF6F6;
    color: var(--somma-teal);
    border: 1px solid #B0DCDC;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }

  .header-date {
    font-size: 12px;
    color: var(--somma-muted);
  }

  /* ── METRICS ── */
  .metrics-bar {
    background: var(--somma-white);
    border-bottom: 1px solid var(--somma-border);
    padding: 1.25rem 2rem;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 1px;
  }

  .metric {
    padding: 0 1.5rem;
    border-right: 1px solid var(--somma-border);
  }

  .metric:first-child { padding-left: 0; }
  .metric:last-child { border-right: none; }

  .metric-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--somma-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .metric-value {
    font-size: 26px;
    font-weight: 300;
    color: var(--somma-dark);
    letter-spacing: -0.02em;
  }

  .metric-value.accent { color: var(--somma-gold); }
  .metric-value.teal   { color: var(--somma-teal); }

  .metric-sub {
    font-size: 11px;
    color: var(--somma-muted);
    margin-top: 2px;
  }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    color: var(--somma-muted);
  }

  .search-input {
    background: var(--somma-white);
    border: 1px solid var(--somma-border);
    border-radius: 8px;
    padding: 8px 12px 8px 32px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--somma-text);
    width: 240px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--somma-mid); }

  .filter-btn {
    background: var(--somma-white);
    border: 1px solid var(--somma-border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    color: var(--somma-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }

  .filter-btn:hover {
    border-color: var(--somma-mid);
    color: var(--somma-mid);
  }

  .filter-btn.active {
    background: var(--somma-dark);
    border-color: var(--somma-dark);
    color: var(--somma-white);
    font-weight: 500;
  }

  .filter-btn.f-quente.active  { background: var(--somma-gold);  border-color: var(--somma-gold); }
  .filter-btn.f-morno.active   { background: #8FA88F; border-color: #8FA88F; }
  .filter-btn.f-frio.active    { background: var(--somma-mid);  border-color: var(--somma-mid); }

  /* ── TABLE ── */
  .table-card {
    background: var(--somma-white);
    border: 1px solid var(--somma-border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-head {
    display: grid;
    grid-template-columns: 2.6fr 1.8fr 1.4fr 1.6fr 1fr;
    gap: 16px;
    padding: 10px 20px;
    background: #F4F6F7;
    border-bottom: 1px solid var(--somma-border);
  }

  .th {
    font-size: 10px;
    font-weight: 600;
    color: var(--somma-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .lead-row {
    display: grid;
    grid-template-columns: 2.6fr 1.8fr 1.4fr 1.6fr 1fr;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid #F0F3F4;
    cursor: pointer;
    transition: background 0.12s;
    align-items: center;
  }

  .lead-row:last-child { border-bottom: none; }
  .lead-row:hover { background: #F9FAFB; }
  .lead-row.selected { background: #F4F8F8; border-left: 3px solid var(--somma-teal); padding-left: 17px; }

  /* ── LEAD INFO ── */
  .lead-info { display: flex; align-items: center; gap: 12px; }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }

  .lead-name { font-size: 13px; font-weight: 500; color: var(--somma-dark); line-height: 1.3; }
  .lead-sub  { font-size: 11px; color: var(--somma-muted); margin-top: 1px; }

  /* ── LAST ACTION ── */
  .action-text { font-size: 12px; font-weight: 500; }
  .action-time { font-size: 11px; color: var(--somma-muted); margin-top: 2px; }

  /* ── SCORE ── */
  .score-col { display: flex; flex-direction: column; gap: 5px; }
  .score-num { font-size: 16px; font-weight: 300; color: var(--somma-dark); letter-spacing: -0.02em; }
  .bar-track { height: 3px; background: #E8ECEE; border-radius: 2px; }
  .bar-fill  { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

  /* ── SIGNALS ── */
  .signals { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

  .sig-dot {
    width: 8px; height: 8px; border-radius: 50%;
    position: relative;
  }

  .sig-dot[title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: 14px; left: 50%; transform: translateX(-50%);
    background: var(--somma-dark); color: #fff;
    font-size: 10px; white-space: nowrap;
    padding: 3px 8px; border-radius: 4px;
    pointer-events: none; z-index: 10;
  }

  /* ── STATUS BADGE ── */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap;
  }

  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
  }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    background: #F4F8F8;
    border-top: 1px solid var(--somma-border);
    padding: 20px;
    display: none;
  }

  .detail-panel.open { display: block; }

  .detail-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }

  .detail-title {
    font-size: 12px; font-weight: 600;
    color: var(--somma-teal);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .simulate-btn {
    background: var(--somma-teal);
    border: none; color: #fff;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 12px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .simulate-btn:hover { opacity: 0.85; }
  .simulate-btn:disabled { opacity: 0.4; cursor: default; }

  .timeline { display: flex; flex-direction: column; gap: 0; }

  .tl-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #E4ECEE;
  }

  .tl-item:last-child { border-bottom: none; }

  .tl-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 4px; flex-shrink: 0;
  }

  .tl-text { font-size: 12px; color: var(--somma-dark); flex: 1; }
  .tl-time { font-size: 11px; color: var(--somma-muted); margin-top: 2px; }
  .tl-pts  { font-size: 12px; font-weight: 600; color: var(--somma-teal); white-space: nowrap; }

  /* ── EMPTY ── */
  .empty {
    padding: 3rem; text-align: center;
    color: var(--somma-muted); font-size: 13px;
  }

  /* ── FOOTER ── */
  .page-footer {
    text-align: center;
    padding: 2rem;
    font-size: 11px;
    color: var(--somma-muted);
    letter-spacing: 0.04em;
  }
</style>
</head>

function getStatusFromScore(score) {
  if (score >= 115) return 'prioritario';
  if (score >= 80)  return 'quente';
  if (score >= 40)  return 'mornando';
  return 'frio';
}

    <div class="metric">
      <div class="metric-label">Total de leads</div>
      <div class="metric-value">${LEADS.length}</div>
      <div class="metric-sub">na base ativa</div>
    </div>
    <div class="metric">
      <div class="metric-label">Prontos para contato</div>
      <div class="metric-value accent">${hot}</div>
      <div class="metric-sub">quentes ou prioritários</div>
    </div>
    <div class="metric">
      <div class="metric-label">Em aquecimento</div>
      <div class="metric-value teal">${warm}</div>
      <div class="metric-sub">mornando</div>
    </div>
    <div class="metric">
      <div class="metric-label">Score médio</div>
      <div class="metric-value">${avg} <span style="font-size:14px;color:var(--somma-muted)">pts</span></div>
      <div class="metric-sub">da base atual</div>
    </div>
  `;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = LEADS.filter(l => {
    const matchQ = l.name.toLowerCase().includes(q) || l.company.toLowerCase().includes(q) || l.city.toLowerCase().includes(q);
    const matchF = activeFilter === 'todos'
      || l.status === activeFilter
      || (activeFilter === 'quente' && l.status === 'prioritario');
    return matchQ && matchF;
  });

  const body = document.getElementById('table-body');

  if (!filtered.length) {
    body.innerHTML = '<div class="empty">Nenhum lead encontrado com esse filtro.</div>';
    document.getElementById('detail-panel').className = 'detail-panel';
    return;
  }

  body.innerHTML = filtered.map(l => {
    const s = STATUS[l.status];
    const pct = Math.min(100, Math.round((l.score / 140) * 100));
    const sigDots = Object.entries(l.signals).map(([k, v]) => {
      const strong = (k === 'E-mail respondido' || k === 'Quiz feito');
      const col = v ? (strong ? '#CC8B15' : '#007374') : '#E8ECEE';
      return `<div class="sig-dot" title="${k}" style="background:${col}"></div>`;
    }).join('');

    return `
      <div class="lead-row ${selectedId === l.id ? 'selected' : ''}" onclick="selectLead(${l.id})">
        <div class="lead-info">
          <div class="avatar" style="background:${l.avatarBg};color:${l.avatarColor}">${l.initials}</div>
          <div>
            <div class="lead-name">${l.name}</div>
            <div class="lead-sub">${l.company} &middot; ${l.city}</div>
          </div>
        </div>
        <div>
          <div class="action-text" style="color:${l.actionColor}">${l.lastAction}</div>
          <div class="action-time">${l.lastTime}</div>
        </div>
        <div class="score-col">
          <div class="score-num">${l.score} <span style="font-size:11px;color:var(--somma-muted)">pts</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${BAR_COLOR[l.status]}"></div></div>
        </div>
        <div class="signals">${sigDots}</div>
        <div>
          <span class="status-badge" style="background:${s.bg};color:${s.color}">
            <span class="status-dot" style="background:${s.dot}"></span>
            ${s.label}
          </span>
        </div>
      </div>
    `;
  }).join('');

  if (selectedId && filtered.find(l => l.id === selectedId)) renderDetail();
  else document.getElementById('detail-panel').className = 'detail-panel';
}

function selectLead(id) {
  selectedId = selectedId === id ? null : id;
  render();
}

function renderDetail() {
  const l = LEADS.find(x => x.id === selectedId);
  if (!l) return;
  const panel = document.getElementById('detail-panel');
  panel.className = 'detail-panel open';
  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">Histórico de sinais &mdash; ${l.name}</div>
      <button class="simulate-btn" id="sim-btn" onclick="simulateAction(${l.id})">+ Simular nova ação</button>
    </div>
    <div class="timeline">
      ${l.timeline.map(t => `
        <div class="tl-item">
          <div class="tl-dot" style="background:${t.color}"></div>
          <div style="flex:1">
            <div class="tl-text">${t.text}</div>
            <div class="tl-time">${t.time}</div>
          </div>
          <div class="tl-pts">${t.pts}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function simulateAction(id) {
  const l = LEADS.find(x => x.id === id);
  const btn = document.getElementById('sim-btn');
  const action = SIM_ACTIONS[Math.floor(Math.random() * SIM_ACTIONS.length)];
  btn.disabled = true;
  btn.textContent = 'Registrando evento...';

  setTimeout(() => {
    l.score += action.pts;
    if (action.sig) l.signals[action.sig] = true;
    l.lastAction = action.text;
    l.lastTime = 'agora mesmo';
    l.actionColor = action.color;
    l.status = getStatusFromScore(l.score);
    l.timeline.unshift({
      text: action.text,
      pts: '+' + action.pts,
      time: 'Agora',
      color: action.color
    });
    renderMetrics();
    render();
  }, 800);
}

renderMetrics();
render();
</script>
</body>
</html>
